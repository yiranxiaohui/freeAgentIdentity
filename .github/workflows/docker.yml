name: Build Docker Image

on:
  push:
    tags:
      - 'v*'            # 推 v1.0.0 这样的 tag 时构建并推 :latest + :版本号
  workflow_dispatch: {}  # 也可在 Actions 页手动触发（不打 tag 时按分支名打 tag）

jobs:
  build-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # 镜像装了 chromium + playwright + camoufox，成品 2-3GB，
      # 清掉 runner 上用不到的 SDK 腾出磁盘，避免构建时空间不足。
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # GHCR 镜像引用必须全小写；仓库名 freeAgentIdentity 含大写，需转小写。
      - name: Compute lowercase image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Inject version into source
        run: echo '__version__ = "${{ steps.version.outputs.version }}"' > core/version.py

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: APP_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
